type: vertical-stack
cards:
  - type: custom:button-card
    entity: sensor.robiroboter_state
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
        - background: |
            [[[
              const s = (states['sensor.robiroboter_state']?.state || '').toLowerCase();
              const v = (states['sensor.robiroboter_vacuum_state']?.state || '').toLowerCase();

              if (s.includes('clean') || v.includes('clean')) return '#2EAD6B';
              if (s.includes('charge') || v.includes('charge')) return '#4AABDB';
              const err = (states['sensor.robiroboter_error_state']?.state || '').toLowerCase();
              if (err && err !== 'unbekannt' && err !== 'unknown' && err !== 'no error' && err !== '0') return '#D64545';
            ]]]
        - border-radius: 14px 14px 0 0
        - padding: 0
        - box-shadow: none
        - color: white
        - overflow: hidden
      grid:
        - grid-template-areas: "\"ui\""
        - grid-template-columns: 1fr
      custom_fields:
        ui:
          - width: 100%
          - justify-self: stretch
    custom_fields:
      ui: |
        [[[
          const battery = states['sensor.robiroboter_battery']?.state ?? '-';
          const state = states['sensor.robiroboter_state']?.state ?? 'Unbekannt';
          const vac = states['sensor.robiroboter_vacuum_state']?.state ?? 'Unbekannt';
          const err = states['sensor.robiroboter_error_state']?.state ?? 'Unbekannt';
          const tracker = states['device_tracker.robiroboter_robi']?.state ?? 'unknown';
          const net = states['switch.robiroboter_internetzugang']?.state ?? 'unknown';
          const cleanDuration = states['sensor.robiroboter_reinigungsdauer']?.state ?? '-';

          const online = tracker === 'home' || tracker === 'on' || tracker === 'online';
          const internet = net === 'on';

          const b = parseFloat(battery);
          const batteryText = isNaN(b) ? '-' : `${Math.round(b)} %`;

          const d = parseFloat(cleanDuration);
          const cleanDurationText = isNaN(d) ? '-' : `${Math.round(d)} min`;

          const s = String(state).toLowerCase();
          const v = String(vac).toLowerCase();

          let main = 'Bereit';
          let sub = 'Robi ist verbunden';

          if (!online) {
            main = 'Offline';
            sub = 'Robi ist nicht erreichbar';
          } else if (s.includes('clean') || v.includes('clean')) {
            main = 'Reinigung';
            sub = cleanDurationText !== '-' ? `Robi arbeitet seit ${cleanDurationText}` : 'Robi arbeitet gerade';
          } else if (s.includes('charge') || v.includes('charge')) {
            main = 'Laden';
            sub = 'Robi ist an der Station';
          } else if (
            err &&
            err.toLowerCase() !== 'unbekannt' &&
            err.toLowerCase() !== 'unknown' &&
            err.toLowerCase() !== 'no error' &&
            err !== '0'
          ) {
            main = 'Fehler';
            sub = err;
          }

          const row = (a,b) => `
            <div style="
              display:grid;
              grid-template-columns: 1fr 1fr;
              align-items:center;
              min-height:40px;
              border-top:1px solid rgba(255,255,255,.22);
              padding:0 25px;
              font-size:12px;
              font-weight:300;
            ">
              <div style="text-align:left;">${a}</div>
              <div style="text-align:right;">${b}</div>
            </div>
          `;

          const pill = (text, active) => `
            <span style="
              display:inline-flex;
              align-items:center;
              justify-content:center;
              padding:5px 10px;
              border-radius:999px;
              background:${active ? 'rgba(255,255,255,.92)' : 'rgba(255,255,255,.18)'};
              color:${active ? '#30343B' : 'white'};
              font-size:10px;
              font-weight:600;
              margin-left:6px;
            ">${text}</span>
          `;

          return `
            <div style="
              width:100%;
              height:450px;
              display:flex;
              flex-direction:column;
              text-align:center;
              font-family:Helvetica,Arial,sans-serif;
            ">
              <div style="
                width:100%;
                height:40px;
                flex-shrink:0;
                background:#eeeeee;
                color:#555;
                font-size:20px;
                display:flex;
                align-items:center;
                justify-content:center;
              ">
                RobiRobot
              </div>

              <div style="flex-shrink:0;padding-top:18px;">
                <div style="
                  margin:0 auto;
                  width:120px;
                  height:120px;
                  border-radius:50%;
                  border:4px solid rgba(255,255,255,.45);
                  display:flex;
                  align-items:center;
                  justify-content:center;
                ">
                  <ha-icon icon="mdi:robot-vacuum" style="
                    width:68px;
                    height:68px;
                    color:white;
                  "></ha-icon>
                </div>

                <div style="
                  font-size:35px;
                  font-weight:600;
                  margin-top:26px;
                ">
                  ${main}
                </div>

                <div style="
                  font-size:18px;
                  font-weight:300;
                  margin-top:4px;
                  padding:0 24px;
                ">
                  ${sub}
                </div>

                <div style="margin-top:14px;">
                  ${pill(online ? 'Online' : 'Offline', online)}
                  ${pill(internet ? 'Internet an' : 'Internet aus', internet)}
                  ${pill(batteryText, true)}
                </div>
              </div>

              <div style="
                flex:1;
                overflow-y:auto;
                -webkit-overflow-scrolling:touch;
                margin-top:24px;
              ">
                ${row('Akku', batteryText)}
                ${row('Reinigungsdauer', cleanDurationText)}
                ${row('Status', state)}
                ${row('Vacuum Status', vac)}
                ${row('Fehlerstatus', err)}
                ${row('Anwesenheit', online ? 'Zuhause' : tracker)}
                ${row('Internetzugang', internet ? 'Aktiv' : 'Gesperrt')}
                ${row('IP / Gerät', '192.168.178.108')}
                ${row('MAC', '10:52:1C:E2:84:F1')}
              </div>
            </div>
          `;
        ]]]
